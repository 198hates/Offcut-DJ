name: Build & Release

# Push a version tag (e.g. v0.1.0) to build + publish installers to GitHub
# Releases. Or run manually (workflow_dispatch) to just build + attach the
# installers as run artifacts (no release).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon (arm64)
            os: macos-14
            ebflags: --mac --arm64
          # Intel macOS is deliberately NOT in this matrix. GitHub's hosted Intel
          # runner (macos-13) does not get scheduled for this repo — a tagged run
          # would leave the x64 job queued forever and, because the publish job
          # `needs: build`, hang the whole release (verified 2026-06-27: arm64 +
          # Windows finished while macos-13 sat queued 9+ min). Build Intel natively
          # on an Intel Mac with `npm run build:mac:x64`, or via an x64 Node
          # toolchain under Rosetta (the x64 ffmpeg-static / onnxruntime-node
          # prebuilts can't be cross-produced on an arm64 host).
          - name: Windows (x64)
            os: windows-latest
            ebflags: --win --x64

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # pull build/models/*.onnx so it gets bundled

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # ≥22.12 — required by @electron/rebuild; ships npm 10.9
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/audio-engine

      # `npm install` (not `npm ci`) so each runner fetches its own platform's
      # native optional deps — npm omits cross-platform optionals like
      # @rollup/rollup-win32-x64-msvc from a lockfile generated on another OS
      # (npm/cli#4828). The committed lockfile still pins the resolved tree.
      # postinstall then runs `electron-builder install-app-deps`, rebuilding the
      # native node modules (better-sqlite3, onnxruntime-node, …) for this arch.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # SQLCipher needs its own @electron/rebuild against the exact Electron
      # version for this arch.
      - name: Rebuild SQLCipher for Electron
        run: npm run rebuild:sqlcipher

      # Builds the Rust cdylib for the runner's host arch and copies it to the
      # fixed crate-audio-engine.node the packager bundles.
      - name: Build Rust audio engine
        run: npm run engine:build

      - name: Build renderer + main (tsc + vite)
        run: npm run build

      # Build only — never publish from a matrix job. Concurrent jobs racing to
      # create the same GitHub Release caused 422 already_exists; the separate
      # `release` job below collects every job's artifacts and publishes once.
      - name: Package
        run: npx electron-builder --config electron-builder.cjs ${{ matrix.ebflags }} --publish never
        env:
          # Unsigned for now — stop electron-builder hunting for a signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: offcut-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  # Single publisher: collect every build job's installers and create/update the
  # GitHub Release once. Only on a version tag; manual runs just leave artifacts.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 # for the per-platform "how to open" guides

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # flatten all per-job artifacts into one dir

      # Ship the unsigned first-launch instructions alongside every installer.
      - name: Stage how-to-open guides
        run: cp resources/release/HOW-TO-OPEN-*.txt artifacts/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la artifacts
          # Create the release with all assets, or (on a re-run) upload to the
          # existing one. Idempotent either way.
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/* \
          || gh release upload "${{ github.ref_name }}" artifacts/* --clobber --repo "${{ github.repository }}"
